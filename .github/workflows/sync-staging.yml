name: Sync Staging to Main

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  sync-staging:
    name: Force Update Staging
    runs-on: ubuntu-latest
    # Run ONLY if manually dispatched OR if a PR targeting main was merged (staging -> main merge)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Reset staging to main
        run: |
          git checkout -b staging || git checkout staging
          git reset --hard origin/main
          git push --force origin staging
