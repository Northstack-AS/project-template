name: Notify PR Approved

on:
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    if: github.event.review.state == 'approved'
    steps:
      - name: Wait for status checks
        run: |
          echo "Waiting for other status checks to complete..."
          # We check the combined status of the head SHA
          for i in {1..10}; do
            STATUS=$(gh api repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}/status --jq '.state')
            if [ "$STATUS" == "success" ]; then
              echo "Checks passed!"
              exit 0
            fi
            echo "Waiting for checks (current: $STATUS)..."
            sleep 30
          done
          echo "Timed out waiting for successful status checks."
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_CTO }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO_NAME="${{ github.repository }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          
          PAYLOAD=$(cat <<JSON
          {
            "content": "✅ PR #$PR_NUMBER is approved and ready for merge in **$REPO_NAME**: $PR_URL"
          }
          JSON
          )
          
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
