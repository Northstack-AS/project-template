name: CodeRabbit Auto-Fix Loop

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  autofix:
    if: |
      github.event.review.state == 'changes_requested' &&
      github.event.review.user.login == 'coderabbitai' &&
      contains(github.event.pull_request.labels.*.name, 'openhands')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Handle Auto-Fix Cycle
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN || github.token }}
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const review_body = context.payload.review.body;

            // Determine current cycle
            let current_cycle = 0;
            if (labels.includes('autofix-3')) current_cycle = 3;
            else if (labels.includes('autofix-2')) current_cycle = 2;
            else if (labels.includes('autofix-1')) current_cycle = 1;

            if (current_cycle >= 3) {
              // Escalation to Chairman
              console.log('Max autofix cycles reached. Escalating to Chairman.');
              
              // Add needs-human label
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr_number,
                labels: ['needs-human']
              });

              // Send Discord notification
              const discord_webhook = process.env.DISCORD_WEBHOOK_CTO;
              if (discord_webhook) {
                const payload = {
                  content: `⚠️ **PR #${pr_number}** in **${repo}** has failed 3 auto-fix cycles and requires Chairman review.\nLink: ${context.payload.pull_request.html_url}`
                };
                await fetch(discord_webhook, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload)
                });
              }
              return;
            }

            // Trigger next cycle
            const next_cycle = current_cycle + 1;
            console.log(`Starting autofix cycle ${next_cycle}...`);

            // Update labels: remove old, add new
            if (current_cycle > 0) {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: pr_number,
                name: `autofix-${current_cycle}`
              }).catch(() => {});
            }
            
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr_number,
              labels: [`autofix-${next_cycle}`]
            });

            // Post @openhands-agent comment with feedback
            const feedback_comment = `@openhands-agent CodeRabbit has requested changes. Please address the following feedback:\n\n${review_body}`;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr_number,
              body: feedback_comment
            });
        env:
          DISCORD_WEBHOOK_CTO: ${{ secrets.DISCORD_WEBHOOK_CTO }}
