name: Resolve Issue with OpenHands

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  call-openhands:
    # Trigger on 'fix-me' label OR '@openhands-agent' comment, but ONLY if NOT on a Pull Request
    if: |
      (github.event.label.name == 'fix-me' || contains(github.event.comment.body, '@openhands-agent')) &&
      github.event.issue.pull_request == null
    uses: OpenHands/OpenHands-Web/.github/workflows/openhands-resolver.yml@88df1233d540730c795f1b014ec38fcf5f51d8b1
    with:
      macro: '@openhands-agent'
      max_iterations: 25
      LLM_MODEL: 'openrouter/google/gemini-3-flash-preview'
      target_branch: 'staging'
      pr_type: 'ready'
      # Configures git identity for OpenHands in the reusable workflow
      # Note: Reusable workflows in GHA cannot be preceded by steps in the same job
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      PAT_USERNAME: ${{ secrets.PAT_USERNAME || github.actor }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
