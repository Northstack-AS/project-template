name: Resolve Issue with OpenHands

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  call-openhands:
    # Trigger on 'fix-me' label OR '@openhands-agent' comment, but ONLY if NOT on a Pull Request
    if: |
      (github.event.label.name == 'fix-me' || contains(github.event.comment.body, '@openhands-agent')) &&
      github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Git
        run: |
          git config --global user.email "oystein@barhaughogda.com"
          git config --global user.name "Oystein Barhaughogda"

      - name: Call OpenHands Resolver
        uses: OpenHands/OpenHands/.github/workflows/openhands-resolver.yml@main
        with:
          macro: '@openhands-agent'
          max_iterations: 25
          LLM_MODEL: 'openrouter/google/gemini-3-flash-preview'
          target_branch: 'staging'
        secrets:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          PAT_USERNAME: ${{ secrets.PAT_USERNAME || github.actor }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
