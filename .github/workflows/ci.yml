name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install --legacy-peer-deps
          else
            echo "No package.json found — skipping install (template repo)"
          fi
      - name: Run lint
        run: |
          if [ -f package.json ] && node -e "require('./package.json').scripts?.lint" 2>/dev/null; then
            npm run lint
          else
            echo "No lint script — skipping (template repo)"
          fi

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install --legacy-peer-deps
          else
            echo "No package.json found — skipping install (template repo)"
          fi
      - name: Run typecheck
        run: |
          if [ -f package.json ] && node -e "require('./package.json').scripts?.typecheck" 2>/dev/null; then
            npm run typecheck
          else
            echo "No typecheck script — skipping (template repo)"
          fi
