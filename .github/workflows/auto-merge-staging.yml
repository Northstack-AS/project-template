name: Auto Merge to Staging

on:
  pull_request:
    branches:
      - staging
  status:
  workflow_run:
    workflows: ["Build", "Lint", "Typecheck"]
    types:
      - completed

jobs:
  auto-merge:
    name: Auto Merge
    runs-on: ubuntu-latest
    if: github.event.pull_request.base.ref == 'staging'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-merge PR to staging
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --squash --auto
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
